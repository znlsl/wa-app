syntax = "proto3";

package byte.v.forge.waapp.v1;

import "byte/v/forge/waapp/v1/account_settings.proto";
import "byte/v/forge/waapp/v1/common.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "ByteVForge.WaApp.V1";
option go_package = "github.com/byte-v-forge/wa-app/gen/go/byte/v/forge/waapp/v1;waappv1";
option java_multiple_files = true;
option java_outer_classname = "WaAppProfileProto";
option java_package = "com.bytevforge.waapp.v1";
option php_namespace = "ByteVForge\\WaApp\\V1";

service WaProfileService {
  rpc CreateWAAccount(CreateWAAccountRequest) returns (CreateWAAccountResponse);
  rpc GetWAAccount(GetWAAccountRequest) returns (GetWAAccountResponse);
  rpc ListWAAccounts(ListWAAccountsRequest) returns (ListWAAccountsResponse);
  rpc DeleteWAAccount(DeleteWAAccountRequest) returns (DeleteWAAccountResponse);
  rpc PrepareClientProfile(PrepareClientProfileRequest) returns (PrepareClientProfileResponse);
  rpc GetClientProfile(GetClientProfileRequest) returns (GetClientProfileResponse);
  rpc ListClientProfiles(ListClientProfilesRequest) returns (ListClientProfilesResponse);
  rpc RetireClientProfile(RetireClientProfileRequest) returns (RetireClientProfileResponse);
}

enum WAAccountStatus {
  WA_ACCOUNT_STATUS_UNSPECIFIED = 0;
  WA_ACCOUNT_STATUS_ACTIVE = 1;
  WA_ACCOUNT_STATUS_PAUSED = 2;
  WA_ACCOUNT_STATUS_ARCHIVED = 3;
  WA_ACCOUNT_STATUS_PENDING_REGISTRATION = 4;
}

enum ClientProfileStatus {
  CLIENT_PROFILE_STATUS_UNSPECIFIED = 0;
  CLIENT_PROFILE_STATUS_PREPARING = 1;
  CLIENT_PROFILE_STATUS_READY = 2;
  CLIENT_PROFILE_STATUS_REJECTED = 3;
  CLIENT_PROFILE_STATUS_RETIRED = 4;
}

enum KeyMaterialStatus {
  KEY_MATERIAL_STATUS_UNSPECIFIED = 0;
  KEY_MATERIAL_STATUS_PENDING = 1;
  KEY_MATERIAL_STATUS_READY = 2;
  KEY_MATERIAL_STATUS_INVALID = 3;
  KEY_MATERIAL_STATUS_ROTATED = 4;
}

message WAAccount {
  string wa_account_id = 1;
  string display_name = 2;
  PhoneTarget phone = 3;
  WAAccountStatus status = 4;
  AuditStamp audit = 5;
  TwoFactorAuthStatus two_factor_auth = 6;
}

message ClientProfile {
  string client_profile_id = 1;
  string wa_account_id = 2;
  string protocol_profile_id = 3;
  ClientProfileStatus status = 4;
  KeyMaterialStatus registration_key_state = 5;
  KeyMaterialStatus messaging_key_state = 6;
  google.protobuf.Timestamp last_used_at = 7;
  AuditStamp audit = 8;
  WaError last_error = 9;
  DeviceFingerprint device_fingerprint = 10;
}

message DeviceFingerprint {
  string fingerprint_id = 1;
  string user_agent = 2;
  string app_version = 3;
  string device_vendor = 4;
  string device_model = 5;
  string android_version = 6;
  string fdid = 7;
  string phone_sha256_prefix = 8;
  string device_ram_gib = 9;
  string mcc = 10;
  string mnc = 11;
  string sim_mcc = 12;
  string sim_mnc = 13;
  string network_radio_type = 14;
  google.protobuf.Timestamp created_at = 15;
}

message CreateWAAccountRequest {
  RequestContext context = 1;
  PhoneTarget phone = 2;
}

message CreateWAAccountResponse {
  WAAccount account = 1;
  WaError error = 2;
}

message GetWAAccountRequest {
  RequestContext context = 1;
  string wa_account_id = 2;
}

message GetWAAccountResponse {
  WAAccount account = 1;
  WaError error = 2;
}

message ListWAAccountsRequest {
  RequestContext context = 1;
  int32 limit = 2;
  string cursor = 3;
}

message ListWAAccountsResponse {
  repeated WAAccount accounts = 1;
  WaError error = 2;
  string next_cursor = 3;
}

message DeleteWAAccountRequest {
  RequestContext context = 1;
  string wa_account_id = 2;
}

message DeleteWAAccountResponse {
  bool success = 1;
  WaError error = 2;
}

message PrepareClientProfileRequest {
  RequestContext context = 1;
  string wa_account_id = 2;
  string protocol_profile_id = 3;
}

message PrepareClientProfileResponse {
  ClientProfile client_profile = 1;
  WaError error = 2;
}

message GetClientProfileRequest {
  RequestContext context = 1;
  string client_profile_id = 2;
}

message GetClientProfileResponse {
  ClientProfile client_profile = 1;
  WaError error = 2;
}

message ListClientProfilesRequest {
  RequestContext context = 1;
  string wa_account_id = 2;
  int32 limit = 3;
  string cursor = 4;
}

message ListClientProfilesResponse {
  repeated ClientProfile client_profiles = 1;
  string next_cursor = 2;
  WaError error = 3;
}

message RetireClientProfileRequest {
  RequestContext context = 1;
  string client_profile_id = 2;
  string reason = 3;
}

message RetireClientProfileResponse {
  ClientProfile client_profile = 1;
  WaError error = 2;
}
