syntax = "proto3";

package byte.v.forge.waapp.v1;

import "byte/v/forge/waapp/v1/common.proto";

option csharp_namespace = "ByteVForge.WaApp.V1";
option go_package = "github.com/byte-v-forge/wa-app/gen/go/byte/v/forge/waapp/v1;waappv1";
option java_multiple_files = true;
option java_outer_classname = "WaAppToolingProto";
option java_package = "com.bytevforge.waapp.v1";
option php_namespace = "ByteVForge\\WaApp\\V1";

service WaToolingService {
  rpc GeneratePhoneFingerprintProfile(GeneratePhoneFingerprintProfileRequest) returns (GeneratePhoneFingerprintProfileResponse);
  rpc ImportWamsysCapture(ImportWamsysCaptureRequest) returns (ImportWamsysCaptureResponse);
  rpc BuildRegistrationRequest(BuildRegistrationRequestRequest) returns (BuildRegistrationRequestResponse);
  rpc EncryptWASafeEnvelope(EncryptWASafeEnvelopeRequest) returns (EncryptWASafeEnvelopeResponse);
  rpc DeriveRegistrationToken(DeriveRegistrationTokenRequest) returns (DeriveRegistrationTokenResponse);
  rpc DeriveAuthKey(DeriveAuthKeyRequest) returns (DeriveAuthKeyResponse);
}

enum RegistrationRequestKind {
  REGISTRATION_REQUEST_KIND_UNSPECIFIED = 0;
  REGISTRATION_REQUEST_KIND_EXIST = 1;
  REGISTRATION_REQUEST_KIND_CODE = 2;
  REGISTRATION_REQUEST_KIND_REGISTER = 3;
}

message PhoneFingerprintProfile {
  reserved 4;

  string schema = 1;
  PhoneTarget phone = 2;
  string phone_sha256 = 3;
  map<string, string> base_params = 5;
  map<string, string> raw_params = 6;
  map<string, string> device_map_params = 7;
  string profile_sha256 = 8;
}

message RegistrationRequestParam {
  string key = 1;
  SensitiveText value = 2;
  bool raw_percent_encoded = 3;
}

message WamsysScalarField {
  string field_name = 1;
  string value = 2;
}

message WamsysMapParam {
  string key = 1;
  bytes value = 2;
}

message WamsysByteField {
  string field_name = 1;
  bytes value = 2;
}

message WamsysCapture {
  repeated WamsysScalarField scalar_fields = 1;
  repeated WamsysMapParam map_params = 2;
  repeated WamsysByteField byte_fields = 3;
}

message GeneratePhoneFingerprintProfileRequest {
  reserved 3;

  RequestContext context = 1;
  PhoneTarget phone = 2;
}

message GeneratePhoneFingerprintProfileResponse {
  PhoneFingerprintProfile profile = 1;
  WaError error = 2;
}

message ImportWamsysCaptureRequest {
  RequestContext context = 1;
  string json_text = 2;
}

message ImportWamsysCaptureResponse {
  WamsysCapture capture = 1;
  WaError error = 2;
}

message BuildRegistrationRequestRequest {
  RequestContext context = 1;
  RegistrationRequestKind kind = 2;
  PhoneTarget phone = 3;
  string client_profile_id = 4;
  string method = 5;
  string language = 6;
  string locale = 7;
  string verification_code = 8;
  WamsysCapture wamsys_capture = 9;
  bool apply_wamsys_scalars = 10;
  bool include_wamsys_map = 11;
  bool include_wamsys_id_backup = 12;
  repeated RegistrationRequestParam extra_params = 13;
  bool include_sensitive_values = 14;
  bool encrypt_request = 15;
}

message BuildRegistrationRequestResponse {
  repeated RegistrationRequestParam params = 1;
  repeated string raw_param_keys = 2;
  SensitiveText plaintext = 3;
  SensitiveText body = 4;
  string enc_sha256 = 5;
  int32 enc_length = 6;
  map<string, string> headers = 7;
  string user_agent = 8;
  WaError error = 9;
}

message EncryptWASafeEnvelopeRequest {
  RequestContext context = 1;
  SensitiveText plaintext = 2;
  string server_public_key_hex = 3;
  bool include_sensitive_values = 4;
}

message EncryptWASafeEnvelopeResponse {
  SensitiveText enc = 1;
  string enc_sha256 = 2;
  int32 enc_length = 3;
  WaError error = 4;
}

message DeriveRegistrationTokenRequest {
  RequestContext context = 1;
  bytes apk = 2;
  PhoneTarget phone = 3;
  string package_name = 4;
  bool include_sensitive_values = 5;
}

message DeriveRegistrationTokenResponse {
  SensitiveText token = 1;
  WaError error = 2;
}

message DeriveAuthKeyRequest {
  RequestContext context = 1;
  string keystore_xml = 2;
  bool include_sensitive_values = 3;
}

message DeriveAuthKeyResponse {
  SensitiveText authkey = 1;
  WaError error = 2;
}
