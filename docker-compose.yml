services:
  # ── wa-app 核心服务 ─────────────────────────────────────────────
  wa-app:
    image: ghcr.io/pood1e/wa-app-service:${WA_APP_IMAGE_TAG:-latest}
    container_name: wa-app
    environment:
      WA_APP_LISTEN_ADDR: ${WA_APP_LISTEN_ADDR:-:50091}
      WA_APP_DASHBOARD_HTTP_ADDR: ${WA_APP_DASHBOARD_HTTP_ADDR:-:8080}
      WA_APP_DASHBOARD_STATIC_DIR: ${WA_APP_DASHBOARD_STATIC_DIR:-/app/dashboard/wa}
      WA_APP_AUTH_PASSWORD: ${WA_APP_AUTH_PASSWORD:-}
      WA_APP_PG_DSN: ${WA_APP_PG_DSN:-}
      WA_APP_REDIS_URL: ${WA_APP_REDIS_URL:-}
      WA_COMMON_PROXY: ${WA_COMMON_PROXY:-}
      WA_APP_DEVICE_PROFILES_FILE: ${WA_APP_DEVICE_PROFILES_FILE:-}
      WA_APP_PLAY_INTEGRITY_API_URL: ${WA_APP_PLAY_INTEGRITY_API_URL:-}
      WA_APP_PLAY_INTEGRITY_API_TOKEN: ${WA_APP_PLAY_INTEGRITY_API_TOKEN:-}
      WA_APP_DATA_DIR: ${WA_APP_DATA_DIR:-/var/lib/wa-app}
    ports:
      - "127.0.0.1:50091:50091"
      - "127.0.0.1:8080:8080"
    volumes:
      - wa-app-data:${WA_APP_DATA_DIR:-/var/lib/wa-app}
    restart: unless-stopped
    # depends_on:
    #   postgres:
    #     condition: service_started
    #   redis:
    #     condition: service_started

  # ── PostgreSQL（可选）─────────────────────────────────────────
  # 取消下方注释并设置 WA_APP_PG_DSN 以启用 PostgreSQL 持久化
  # postgres:
  #   image: postgres:17-alpine
  #   container_name: wa-app-postgres
  #   environment:
  #     - POSTGRES_USER=wa-app
  #     - POSTGRES_PASSWORD=wa-app-password
  #     - POSTGRES_DB=wa-app
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

  # ── Redis（可选）──────────────────────────────────────────────
  # 取消下方注释并设置 WA_APP_REDIS_URL 以启用 Redis 运行时状态
  # redis:
  #   image: redis:7-alpine
  #   container_name: wa-app-redis
  #   volumes:
  #     - redis-data:/data
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  wa-app-data:
    name: wa-app-data
